<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="10" y="10" width="100" height="100" rx="26" fill="url(#brandGrad)"/>

  <!-- Quill silhouette -->
  <path d="M60 26
           C 78 34, 85 58, 70 77
           C 62 87, 52 92, 44 99
           C 46 85, 50 71, 46 57
           C 42 43, 45 32, 60 26 Z"
        fill="#ffffff" fill-opacity="0.96"/>
  <path d="M60 29 C 54 49, 48 71, 44 97"
        stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M53 45 L44 41" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M50 59 L40 57" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M47 73 L37 73" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Match emblem -->
  <circle cx="98" cy="97" r="15" fill="#ffffff"/>
  <circle cx="98" cy="97" r="15" fill="none" stroke="#9333ea" stroke-width="2"/>
  <path d="M91 97 L96 102 L106 89" fill="none" stroke="#9333ea" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="130" y="63" font-family="Helvetica Neue, Arial, sans-serif" font-size="44"
        font-weight="700" fill="url(#brandGrad)">MatchQuill</text>
  <text x="132" y="88" font-family="Helvetica Neue, Arial, sans-serif" font-size="15"
        fill="#8a8fa3">the career compiler</text>
</svg>
