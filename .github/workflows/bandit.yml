# Bandit security linter for Python app code.
# Uploads SARIF via github/codeql-action/upload-sarif@v4 (not the deprecated v3 path).

name: Bandit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '21 19 * * 2'

jobs:
  bandit:
    name: bandit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]"

      - name: Run Bandit scan
        # exit-zero: findings are reported via Code Scanning, not as a hard CI fail
        run: |
          bandit \
            -r backend/app \
            -f sarif \
            -o results.sarif \
            --exit-zero \
            -x '*/tests/*,*/test_*,*/venv/*,*/.venv/*,*/node_modules/*'

      - name: Ensure SARIF file exists
        run: |
          if [ ! -f results.sarif ]; then
            printf '%s\n' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' > results.sarif
          fi

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          # Must match the Code Scanning tool configuration id historically
          # registered on main by shundor/python-bandit-scan:
          #   /language:python-bandit
          # Omitting this causes PR warning:
          #   "1 configuration present on main was not found".
          category: "/language:python-bandit"

