<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="archBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="40" y="24" font-size="12.5" fill="#64748b">MatchQuill &#8212; system architecture (matches docs/architecture.md)</text>

  <!-- ================= EXTENSION ================= -->
  <rect x="40" y="50" width="260" height="150" rx="16" fill="#6366f1"/>
  <text x="60" y="84" font-size="17" font-weight="700" fill="#ffffff">Chrome Extension</text>
  <text x="60" y="104" font-size="12" fill="#e0e7ff">Manifest V3</text>
  <line x1="60" y1="114" x2="280" y2="114" stroke="#ffffff" stroke-opacity="0.3"/>
  <text x="60" y="134" font-size="12" fill="#eef2ff">Content scripts &#183; job extractor</text>
  <text x="60" y="152" font-size="12" fill="#eef2ff">Popup UI &#183; service worker</text>
  <text x="60" y="176" font-size="11.5" font-style="italic" fill="#c7d2fe">Local JD extraction &#8212; parses the</text>
  <text x="60" y="191" font-size="11.5" font-style="italic" fill="#c7d2fe">posting on the page, nothing else</text>

  <!-- ================= FRONTEND ================= -->
  <rect x="700" y="50" width="260" height="150" rx="16" fill="url(#archBrand)"/>
  <text x="720" y="84" font-size="17" font-weight="700" fill="#ffffff">Next.js Frontend</text>
  <text x="720" y="104" font-size="12" fill="#f3e8ff">App Router &#183; profile command center</text>
  <line x1="720" y1="114" x2="940" y2="114" stroke="#ffffff" stroke-opacity="0.3"/>
  <text x="720" y="134" font-size="12" fill="#f3e8ff">NextAuth &#183; sessions &#183; OAuth</text>
  <text x="720" y="152" font-size="12" fill="#f3e8ff">Prisma ORM &#183; profile / template UI</text>
  <text x="720" y="176" font-size="12" fill="#f3e8ff">exposes GET /api/profile</text>

  <!-- Extension -> Backend arrow -->
  <path d="M175 200 C 205 255, 300 300, 345 340" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="188" y="250" font-size="11.5" fill="#64748b">POST /api/compile</text>
  <text x="188" y="265" font-size="11.5" fill="#64748b">POST /api/cover-letter</text>

  <!-- Backend <-> Frontend arrow -->
  <path d="M662 355 C 760 300, 800 250, 828 200" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="705" y="288" font-size="11.5" fill="#64748b">GET /api/profile</text>
  <text x="705" y="302" font-size="11.5" fill="#64748b">(server-to-server)</text>

  <!-- Frontend -> Postgres arrow -->
  <line x1="830" y1="200" x2="830" y2="258" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="838" y="234" font-size="11.5" fill="#64748b">Prisma</text>

  <!-- ================= BACKEND ================= -->
  <rect x="340" y="260" width="320" height="380" rx="18" fill="url(#archBrand)"/>
  <text x="362" y="292" font-size="17" font-weight="700" fill="#ffffff">FastAPI Backend</text>
  <text x="362" y="312" font-size="11" fill="#f3e8ff">/api/compile &#183; /api/cover-letter &#183; /api/templates</text>

  <!-- Relevance Scorer card -->
  <rect x="364" y="330" width="272" height="116" rx="12" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.4"/>
  <text x="380" y="354" font-size="13.5" font-weight="700" fill="#ffffff">Relevance Scorer</text>
  <text x="380" y="372" font-size="11.5" fill="#f3e8ff">TF-IDF keyword scoring + boosts</text>
  <rect x="380" y="382" width="240" height="52" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.5" stroke-dasharray="3 3"/>
  <text x="392" y="401" font-size="11" font-weight="600" fill="#ffffff">Optional: semantic layer</text>
  <text x="392" y="416" font-size="10.5" fill="#e9d5ff">sentence embeddings &#183; off by default</text>
  <text x="392" y="429" font-size="10.5" fill="#e9d5ff">feature-flagged &#183; bounded bonus only</text>

  <!-- Cover Letter Generator card -->
  <rect x="364" y="458" width="272" height="82" rx="12" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.4"/>
  <text x="380" y="482" font-size="13.5" font-weight="700" fill="#ffffff">Cover Letter Generator</text>
  <text x="380" y="500" font-size="11.5" fill="#f3e8ff">Prompt builder &#183; Groq client</text>
  <text x="380" y="516" font-size="11.5" fill="#f3e8ff">zero-hallucination guard</text>

  <!-- PDF Generator card -->
  <rect x="364" y="552" width="272" height="70" rx="12" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.4"/>
  <text x="380" y="576" font-size="13.5" font-weight="700" fill="#ffffff">PDF Generator</text>
  <text x="380" y="594" font-size="11.5" fill="#f3e8ff">WeasyPrint &#183; strict 1-page ATS layout</text>

  <!-- ================= EXTERNAL SERVICES ================= -->
  <rect x="700" y="258" width="260" height="92" rx="14" fill="#334155"/>
  <text x="720" y="290" font-size="14.5" font-weight="700" fill="#ffffff">PostgreSQL (Neon)</text>
  <text x="720" y="310" font-size="11.5" fill="#cbd5e1">accounts &#183; experiences &#183; projects</text>
  <text x="720" y="328" font-size="11.5" fill="#cbd5e1">skills &#183; education</text>

  <rect x="60" y="680" width="220" height="92" rx="14" fill="#334155"/>
  <text x="80" y="712" font-size="14.5" font-weight="700" fill="#ffffff">Groq LPU</text>
  <text x="80" y="732" font-size="11.5" fill="#cbd5e1">llama-3.3-70b inference</text>
  <text x="80" y="750" font-size="11.5" fill="#cbd5e1">resume + cover-letter generation</text>

  <rect x="720" y="680" width="220" height="92" rx="14" fill="#334155"/>
  <text x="740" y="712" font-size="14.5" font-weight="700" fill="#ffffff">Redis (Upstash)</text>
  <text x="740" y="732" font-size="11.5" fill="#cbd5e1">compiled-resume cache</text>
  <text x="740" y="750" font-size="11.5" fill="#cbd5e1">rate limiting</text>

  <!-- Backend -> Groq -->
  <path d="M420 640 C 340 662, 260 665, 200 680" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="244" y="664" font-size="11.5" fill="#64748b">generation calls</text>

  <!-- Backend -> Redis -->
  <path d="M580 640 C 680 662, 760 665, 820 680" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="628" y="664" font-size="11.5" fill="#64748b">cache + rate limit</text>
</svg>
